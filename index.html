<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal of University Reports - Repositorio Científico</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="app.js"></script>
</head>
<body>
    <header class="journal-header">
        <div class="container">
            <div class="header-top">
                <div class="header-title">
                    <h1>📚 Journal of University Reports</h1>
                    <p>Repositorio oficial de investigaciones y prácticas universitarias</p>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="upload-section">
            <h2>📤 Publicar nuevo informe</h2>
            <form id="uploadForm" class="upload-form">
                <div class="form-group">
                    <label for="title">Título del Informe</label>
                    <input type="text" id="title" required placeholder="Ej. Análisis de Algoritmos de Ordenamiento en Sistemas Distribuidos">
                </div>
                <div class="form-group">
                    <label for="authors">Autores</label>
                    <input type="text" id="authors" required placeholder="Ej. Luna García, Moctezuma López, González Rodríguez">
                </div>
                <div class="form-group">
                    <label for="pdfFile">Selecciona tu archivo PDF</label>
                    <input type="file" id="pdfFile" accept="application/pdf" required>
                </div>
                <button type="submit" class="btn-submit">Subir Informe</button>
            </form>
        </section>

        <hr class="divider">

        <section class="articles-section">
            <h2>📖 Artículos Publicados</h2>
        </section>
    </main>
</body>
</html>
